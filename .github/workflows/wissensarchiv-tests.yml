name: Wissensarchiv E2E-Tests

on:
  push:
    paths: ['wissensarchiv/**']
  pull_request:
    paths: ['wissensarchiv/**']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: wissensarchiv/tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Abhängigkeiten installieren
        run: npm ci || npm install
      - name: Chromium installieren
        run: npx playwright install --with-deps chromium
      - name: E2E-Tests ausführen
        run: npm test
